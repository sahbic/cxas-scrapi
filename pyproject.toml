[tool.ruff]
line-length = 80
target-version = "py310"
extend-exclude = ["*.ipynb", ".agents/skills/cxas-agent-foundry/assets/project-template/", ".agents/skills/cxas-agent-foundry/scripts", ".agents/skills/cxas-sim-eval/scripts", "examples/"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "PL", # pylint
]
ignore = [
    "E203",  # extend-ignore = E203 from flake8
    # Add common PL ignores based on standard Google pylint defaults if Ruff implements them
    "PLR0913", # too-many-arguments
    "PLR0912", # too-many-branches
    "PLR0915", # too-many-statements
    "PLR0911", # too-many-return-statements
    "PLR0914", # too-many-locals
    "PLR2004", # magic-value-comparison
    "PLW0108", # unnecessary-lambda
]

[tool.ruff.lint.per-file-ignores]
"src/cxas_scrapi/migration/prompts.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
