          then_say: "Quote for {symbol}."
          then_response:
          - type: payload
            data:
              text: "{symbolName} is trading at {lastTradeValue}."
        confirm_transition_prefix: ""
        readback_retry:
          max_retries: 2
          on_exhaust:
            say: "Please call."
            then: escalate
        progress_stall:
          max_turns: 4
          on_exhaust:
            say: "Please call."
            then: escalate
      sm:
        _events_checked: true
        filled:
          symbol: "MSFT"
          quote_result: "done"
        pending: {}
        task_results:
          GetQuote:
            success: true
            symbolName: "Microsoft Corp."
            lastTradeValue: "$420.00"
            quote_result: "done"
        _task_just_completed: "GetQuote"
        _last_state:
          filled:
            symbol: "MSFT"
            quote_result: "done"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.response[0].data.text"
      operator: contains
      value: "Microsoft Corp."
    - path: "$.result.action.response[0].data.text"
      operator: contains
      value: "$420.00"

# ═══════════════════════════════════════════════════════════════════
# ON_COMPLETE — terminal task clears slots and resets status
# ═══════════════════════════════════════════════════════════════════

- name: on_complete_clears_slots_and_resets
  tool: slot_filling_engine
  args:
    input_data:
      raw_config:
        slots:
        - name: action
          source: user
          setter: set_action
          hint: "Action"
          ask: "Quote or Rating?"
