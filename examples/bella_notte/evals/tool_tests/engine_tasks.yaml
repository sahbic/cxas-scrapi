          source: "task:GetQuote"
        tasks:
        - name: GetQuote
          tool: get_quote
          inputs: ["symbol"]
          outputs:
            quote_result: quote_result
          success_check: success
          terminal: true
          then_say: "As of {quoteDate}, {symbolName} ({symbol}) is trading at {lastTradeValue}."
        confirm_transition_prefix: ""
        readback_retry:
          max_retries: 2
          on_exhaust:
            say: "Please call."
            then: escalate
        progress_stall:
          max_turns: 4
          on_exhaust:
            say: "Please call."
            then: escalate
      sm:
        _events_checked: true
        filled:
          symbol: "AAPL"
          quote_result: "done"
        pending: {}
        task_results:
          GetQuote:
            success: true
            quoteDate: "May 15, 2026"
            symbolName: "Apple Inc."
            lastTradeValue: "$195.50"
            quote_result: "done"
        _task_just_completed: "GetQuote"
        _last_state:
          filled:
            symbol: "AAPL"
            quote_result: "done"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.message"
      operator: contains
      value: "Apple Inc."
    - path: "$.result.action.message"
      operator: contains
      value: "$195.50"
    - path: "$.result.action.message"
      operator: contains
      value: "AAPL"

- name: task_result_substitution_then_response
  tool: slot_filling_engine
  args:
    input_data:
      raw_config:
        slots:
        - name: symbol
          source: user
          setter: set_symbol
          hint: "Stock symbol"
          ask: "Which symbol?"
          requires_readback: false
        - name: quote_result
          source: "task:GetQuote"
        tasks:
