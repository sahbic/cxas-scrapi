# ═══════════════════════════════════════════════════════════════════
# ANNOUNCE SLOT — three-deep cascade
# ═══════════════════════════════════════════════════════════════════

- name: announce_cascade_three_deep
  tool: slot_filling_engine
  args:
    input_data:
      raw_config:
        slots:
        - name: greeting
          source: announce
          message: "Hello!"
          preempt: false
        - name: hours
          source: announce
          message: "Open 5-10pm."
          preempt: false
        - name: notice
          source: announce
          message: "No walk-ins today."
          preempt: false
        - name: party_size
          source: user
          setter: set_party_size
          hint: "Party size"
          ask: "How many guests?"
          readback_fmt:
            type: plural
            one: guest
            other: guests
          requires_readback: true
        tasks: []
        confirm_transition_prefix: ""
        readback_retry:
          max_retries: 2
          on_exhaust:
            say: "Please call."
            then: escalate
        progress_stall:
          max_turns: 4
          on_exhaust:
            say: "Please call."
            then: escalate
      sm:
        _events_checked: true
        filled: {}
        pending: {}
        _last_state:
          filled: {}
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm.filled.greeting"
      operator: equals
      value: true
    - path: "$.result.sm.filled.hours"
      operator: equals
      value: true
    - path: "$.result.sm.filled.notice"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "Hello!"
    - path: "$.result.action.message"
      operator: contains
      value: "Open 5-10pm."
    - path: "$.result.action.message"
      operator: contains
      value: "No walk-ins today."
    - path: "$.result.action.message"
      operator: contains
      value: "How many guests?"

