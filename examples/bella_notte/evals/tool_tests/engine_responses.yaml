# Slot filling engine: response/payload propagation through all output paths
_config: &config
  slots:
  - name: welcome
    source: announce
    message: "Welcome!"
    preempt: false
    response:
    - type: text
      text: "Welcome!"
    - type: payload
      data:
        richContent:
        - - type: info
            title: "Welcome Card"
  - name: party_size
    source: user
    setter: set_party_size
    hint: "Party size"
    ask: "How many guests?"
    response:
    - type: payload
      data:
        richContent:
        - - type: chips
            options:
            - text: "2"
            - text: "4"
    readback_fmt:
      type: plural
      one: guest
      other: guests
    requires_readback: true
    validation:
      max_retries: 2
      errors:
        out_of_range: "Parties of 1 to 8 only."
      error_responses:
        out_of_range:
        - type: text
          text: "Try 1-8."
        - type: payload
          data:
            richContent:
            - - type: chips
                options:
                - text: "2"
                - text: "4"
      on_exhaust:
        say: "Please call us."
        response:
        - type: payload
          data:
            richContent:
            - - type: info
                title: "Call 555-0100"
        then: escalate
  - name: preferred_date
    source: user
    setter: set_preferred_date
    hint: "Date"
    ask: "What date?"
    readback_fmt: date
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_format: "Use YYYY-MM-DD."
      on_exhaust:
        say: "Please call us."
        then: escalate
  - name: available_times
    source: "task:FindAvailableTimes"
  - name: selected_time
    source: user
    setter: set_selected_time
    hint: "Time"
    requires: ["available_times"]
    ask: "Times: {available_times}. Pick one?"
    response:
    - type: payload
      data:
        richContent:
        - - type: description
            title: "Available for {preferred_date}"
            text:
            - "{available_times}"
    readback_fmt: time
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        not_available: "Not available."
      on_exhaust:
        say: "Please call us."
        then: escalate
  - name: guest_name
    source: user
    setter: set_guest_name
    hint: "Name"
    ask: "Name for the reservation?"
    readback_fmt:
      type: prefix
      text: "under the name"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        empty_name: "Need a name."
      on_exhaust:
        say: "Please call us."
        then: escalate
  - name: confirmation_number
    source: "task:BookReservation"
  tasks:
  - name: FindAvailableTimes
    tool: find_available_times
    inputs: ["party_size", "preferred_date"]
    outputs:
      available_times: available_times
    success_check: success
    then_say: "We have {available_times}."
    then_response:
    - type: payload
      data:
        richContent:
        - - type: info
            title: "Times Found"
    on_failure:
      retry_say: "No availability. Try another date?"
      retry_response:
      - type: payload
        data:
          richContent:
          - - type: info
              title: "Try Another Date"
      max_retries: 2
      clear_slots: ["preferred_date"]
      on_exhaust:
        say: "Please call us."
        response:
        - type: payload
          data:
            richContent:
            - - type: info
                title: "Call For Help"
        then: escalate
  - name: BookReservation
    tool: book_reservation
    inputs: ["party_size", "preferred_date", "selected_time", "guest_name"]
    readback_inputs: true
    outputs:
      confirmation_number: confirmation_number
    success_check: success
    terminal: true
    then_say: "Confirmed! #{confirmation_number}."
    then_response:
    - type: text
      text: "Confirmed! #{confirmation_number}."
    - type: payload
      data:
        richContent:
        - - type: info
            title: "Booking #{confirmation_number}"
            text: "{party_size} guests on {preferred_date}"
    on_failure:
      retry_say: "Let me try again."
      max_retries: 2
      on_exhaust:
        say: "Please call us."
        then: escalate
  confirm_transition_prefix: "Great!"
  readback_retry:
    max_retries: 2
    on_exhaust:
      say: "Please call us."
      response:
      - type: payload
        data:
          richContent:
          - - type: info
              title: "Readback Stall Help"
      then: escalate
  progress_stall:
    max_turns: 4
    on_exhaust:
      say: "Please call us."
      response:
      - type: payload
        data:
          richContent:
          - - type: info
              title: "Progress Stall Help"
      then: escalate
  readback_response:
  - type: payload
    data:
      richContent:
      - - type: chips
          options:
          - text: "Confirm"
          - text: "Change"

# ── Config with channel overrides for channel response tests ───────
_config_channel: &config_channel
  slots:
  - name: welcome
    source: announce
    message: "Welcome!"
    preempt: false
    response:
    - type: payload
      data:
        richContent:
        - - type: info
            title: "Default Welcome"
    channel_response:
      voice:
      - type: audio
        uri: "gs://audio/welcome.wav"
        cancellable: false
  tasks: []
  confirm_transition_prefix: "Great!"
  readback_retry:
    max_retries: 2
    on_exhaust:
      say: "Please call us."
      then: escalate
  progress_stall:
    max_turns: 4
    on_exhaust:
      say: "Please call us."
      then: escalate

tests:
# ═══════════════════════════════════════════════════════════════════
# ANNOUNCE RESPONSE
# ═══════════════════════════════════════════════════════════════════

- name: announce_response_attached
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled: {}
        pending: {}
        _last_state:
          filled: {}
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm._pending_payloads"
      operator: is_not_null
    - path: "$.result.sm._pending_payloads[1].type"
      operator: equals
      value: "payload"

# ═══════════════════════════════════════════════════════════════════
# QUESTION RESPONSE (stashed for after_model_callback)
# ═══════════════════════════════════════════════════════════════════

- name: question_response_stashed
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm._pending_question_payloads.slot"
      operator: equals
      value: "party_size"
    - path: "$.result.sm._pending_question_payloads.parts[0].type"
      operator: equals
      value: "payload"

# ═══════════════════════════════════════════════════════════════════
# VALIDATION ERROR RESPONSE
# ═══════════════════════════════════════════════════════════════════

- name: error_response_attached
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _slot_errors:
        - slot: party_size
          code: out_of_range
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.response[0].type"
      operator: equals
      value: "text"
    - path: "$.result.action.response[0].text"
      operator: equals
      value: "Try 1-8."
    - path: "$.result.action.response[1].type"
      operator: equals
      value: "payload"

# ═══════════════════════════════════════════════════════════════════
# VALIDATION EXHAUST RESPONSE
# ═══════════════════════════════════════════════════════════════════

- name: error_exhaust_response_attached
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _slot_errors:
        - slot: party_size
          code: out_of_range
        _retries:
          "slot:party_size": 2
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.sm.status"
      operator: equals
      value: "escalated"
    - path: "$.result.action.response[0].type"
      operator: equals
      value: "payload"
    - path: "$.result.action.response[0].data.richContent[0][0].title"
      operator: equals
      value: "Call 555-0100"

# ═══════════════════════════════════════════════════════════════════
# TASK SUCCESS — TERMINAL (then_response)
# ═══════════════════════════════════════════════════════════════════

- name: task_terminal_response_attached
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 2
          preferred_date: "2027-06-01"
          available_times: "6:00 PM"
          selected_time: "18:00"
          guest_name: "Maria"
          confirmation_number: "BN-9999"
        pending: {}
        task_results:
          FindAvailableTimes:
            success: true
            available_times: "6:00 PM"
          BookReservation:
            success: true
            confirmation_number: "BN-9999"
        _task_just_completed: "BookReservation"
        _last_state:
          filled:
            welcome: true
            party_size: 2
            preferred_date: "2027-06-01"
            available_times: "6:00 PM"
            selected_time: "18:00"
            guest_name: "Maria"
            confirmation_number: "BN-9999"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.response[0].type"
      operator: equals
      value: "text"
    - path: "$.result.action.response[0].text"
      operator: contains
      value: "BN-9999"
    - path: "$.result.action.response[1].type"
      operator: equals
      value: "payload"
    - path: "$.result.action.response[1].data.richContent[0][0].title"
      operator: contains
      value: "BN-9999"

# ═══════════════════════════════════════════════════════════════════
# TASK SUCCESS — NON-TERMINAL (then_response — NEW FEATURE)
# ═══════════════════════════════════════════════════════════════════

- name: task_nonterminal_response_combined
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
          preferred_date: "2027-06-01"
          available_times: "6:00 PM, 7:30 PM"
        pending: {}
        task_results:
          FindAvailableTimes:
            success: true
            available_times: "6:00 PM, 7:30 PM"
        _task_just_completed: "FindAvailableTimes"
        _last_state:
          filled:
            welcome: true
            party_size: 4
            preferred_date: "2027-06-01"
            available_times: "6:00 PM, 7:30 PM"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "6:00 PM, 7:30 PM"
    - path: "$.result.action.response[0].data.richContent[0][0].title"
      operator: equals
      value: "Times Found"

