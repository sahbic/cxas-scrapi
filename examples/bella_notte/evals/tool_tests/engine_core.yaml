# Slot filling engine: formatters, phase determination, announce slots
_config: &config
  slots:
  - name: welcome
    source: announce
    message: "Welcome to Bella Notte! I'd be happy to help you with a reservation."
    preempt: false
  - name: party_size
    source: ["event", "user"]
    event_key: party_size
    setter: set_party_size
    hint: "Party size / number of users"
    ask: "How many guests will be dining?"
    readback_fmt:
      type: plural
      one: guest
      other: guests
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        out_of_range: "I'm sorry, we accept reservations for parties of 1 to 8."
        parse_error: "I didn't catch the number of guests. How many will be dining?"
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: large_party_phone
    source: user
    setter: set_large_party_phone
    hint: "Contact phone number (for parties of 5 or more)"
    condition: "lambda filled: int(filled.get('party_size', 0)) >= 5"
    ask: "For parties of 5 or more, we require a contact phone number."
    readback_fmt:
      type: prefix
      text: "contact phone"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_phone: "Could you provide a number with at least 7 digits?"
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: preferred_date
    source: user
    setter: set_preferred_date
    hint: "Date"
    ask: "What date would you like to come in?"
    readback_fmt: date
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_format: "Could you provide the date in YYYY-MM-DD format?"
        past_date: "That date is in the past."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: available_times
    source: "task:FindAvailableTimes"
  - name: selected_time
    source: user
    setter: set_selected_time
    hint: "Time (from the presented options)"
    requires: ["available_times"]
    validate_against:
      response_field: display_value
      filled_slot: available_times
      error_code: not_available
    ask: "We have availability at {available_times}. Which time works best for you?"
    readback_fmt: time
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        prereq_not_met: "I need to check availability first."
        not_available: "That time isn't available."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: guest_name
    source: user
    setter: set_guest_name
    hint: "Name"
    ask: "What name should I put the reservation under?"
    readback_fmt:
      type: prefix
      text: "under the name"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        empty_name: "I didn't catch the name."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: special_requests
    source: user
    setter: set_special_requests
    hint: 'Special requests or "none"'
    ask: "Do you have any special requests or dietary needs?"
    readback_fmt:
      type: none_sub
      default: "no special requests"
    requires_readback: true
  - name: confirmation_number
    source: "task:BookReservation"
  tasks:
  - name: FindAvailableTimes
    tool: find_available_times
    inputs: ["party_size", "preferred_date"]
    outputs:
      available_times: available_times
    success_check: success
    then_say: "We have availability at {available_times}."
    on_failure:
      retry_say: "No availability for that date. Try another?"
      max_retries: 1
      clear_slots: ["preferred_date"]
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: BookReservation
    tool: book_reservation
    inputs: ["party_size", "large_party_phone", "preferred_date", "selected_time", "guest_name", "special_requests"]
    readback_inputs: true
    outputs:
      confirmation_number: confirmation_number
    success_check: success
    terminal: true
    then_say: "Your reservation is confirmed. Confirmation number: {confirmation_number}."
    on_failure:
      retry_say: "Let me try once more."
      max_retries: 2
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  confirm_transition_prefix: "Perfect!"
  readback_retry:
    max_retries: 2
    on_exhaust:
      say: "Please call us at 555-0100."
      then: escalate
  progress_stall:
    max_turns: 4
    on_exhaust:
      say: "I'm having trouble completing your reservation. Please call us at 555-0100."
      then: escalate

tests:
# ═══════════════════════════════════════════════════════════════════
# FORMATTERS — validated via readback hint in si_suffix
# ═══════════════════════════════════════════════════════════════════

- name: formatter_date_standard
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          preferred_date: "2027-07-04"
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.si_suffix"
      operator: contains
      value: "on July 4th"

