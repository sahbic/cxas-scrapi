# Slot filling engine: slot errors, retries, stalls, tool hiding
_config: &config
  slots:
  - name: welcome
    source: announce
    message: "Welcome to Bella Notte!"
    preempt: false
  - name: party_size
    source: ["event", "user"]
    event_key: party_size
    setter: set_party_size
    hint: "Party size"
    ask: "How many guests will be dining?"
    readback_fmt:
      type: plural
      one: guest
      other: guests
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        out_of_range: "I'm sorry, we accept reservations for parties of 1 to 8."
        parse_error: "I didn't catch the number of guests. How many will be dining?"
      on_exhaust:
        say: "I'm having trouble with the party size. Please call us at 555-0100."
        then: escalate
  - name: large_party_phone
    source: user
    setter: set_large_party_phone
    hint: "Contact phone number (for parties of 5 or more)"
    condition: "lambda filled: int(filled.get('party_size', 0)) >= 5"
    ask: "What's the best contact number?"
    readback_fmt:
      type: prefix
      text: "contact phone"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_phone: "Need at least 7 digits."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: preferred_date
    source: user
    setter: set_preferred_date
    hint: "Date"
    ask: "What date would you like to come in?"
    readback_fmt: date
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_format: "Please use YYYY-MM-DD."
        past_date: "That date is in the past."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: available_times
    source: "task:FindAvailableTimes"
  - name: selected_time
    source: user
    setter: set_selected_time
    hint: "Time"
    requires: ["available_times"]
    validate_against:
      response_field: display_value
      filled_slot: available_times
      error_code: not_available
    ask: "We have {available_times}. Which time?"
    readback_fmt: time
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        not_available: "That time isn't available. We have {available_times}."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: guest_name
    source: user
    setter: set_guest_name
    hint: "Name"
    ask: "What name for the reservation?"
    readback_fmt:
      type: prefix
      text: "under the name"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        empty_name: "I didn't catch the name."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: special_requests
    source: user
    setter: set_special_requests
    hint: 'Special requests or "none"'
    ask: "Any special requests?"
    readback_fmt:
      type: none_sub
      default: "no special requests"
    requires_readback: true
  - name: confirmation_number
    source: "task:BookReservation"
  tasks:
  - name: FindAvailableTimes
    tool: find_available_times
    inputs: ["party_size", "preferred_date"]
    outputs:
      available_times: available_times
    success_check: success
    then_say: "We have {available_times}."
    on_failure:
      retry_say: "No availability. Try another date?"
      max_retries: 1
      clear_slots: ["preferred_date"]
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: BookReservation
    tool: book_reservation
    inputs: ["party_size", "large_party_phone", "preferred_date", "selected_time", "guest_name", "special_requests"]
    readback_inputs: true
    outputs:
      confirmation_number: confirmation_number
    success_check: success
    terminal: true
    then_say: "Confirmed! Number: {confirmation_number}."
    on_failure:
      retry_say: "Let me try again."
      max_retries: 2
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  confirm_transition_prefix: "Perfect!"
  readback_retry:
    max_retries: 2
    on_exhaust:
      say: "Readback failed. Please call us at 555-0100."
      then: escalate
  progress_stall:
    max_turns: 4
    on_exhaust:
      say: "I'm having trouble completing your reservation. Please call us at 555-0100."
      then: escalate

tests:
# ═══════════════════════════════════════════════════════════════════
# SLOT ERRORS & RETRIES
# ═══════════════════════════════════════════════════════════════════

- name: slot_error_first_retry
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _slot_errors:
        - slot: party_size
          code: out_of_range
        _retries: {}
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: "10 people"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "parties of 1 to 8"

- name: slot_error_second_retry
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _slot_errors:
        - slot: party_size
          code: out_of_range
        _retries:
          "slot:party_size": 1
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: "12"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "parties of 1 to 8"

- name: slot_error_exhaust_escalates
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _slot_errors:
        - slot: party_size
          code: out_of_range
        _retries:
          "slot:party_size": 2
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: "15"
  expectations:
    response:
    - path: "$.result.sm.status"
      operator: equals
      value: "escalated"
    - path: "$.result.action.message"
      operator: contains
      value: "555-0100"

- name: slot_error_unknown_code_fallback
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _slot_errors:
        - slot: party_size
          code: unknown_error
        _retries: {}
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: "abc"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "try that again"

- name: slot_error_multiple_errors
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _slot_errors:
        - slot: party_size
          code: parse_error
        - slot: preferred_date
          code: invalid_format
        _retries: {}
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: "blah"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "guests"
    - path: "$.result.action.message"
      operator: contains
      value: "YYYY-MM-DD"

# ═══════════════════════════════════════════════════════════════════
# PROGRESS STALL
# ═══════════════════════════════════════════════════════════════════

- name: progress_stall_escalates
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _progress_turns: 3
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: "I don't know"
  expectations:
    response:
    - path: "$.result.sm.status"
      operator: equals
      value: "escalated"
    - path: "$.result.action.message"
      operator: contains
      value: "having trouble completing"

- name: progress_stall_resets_on_change
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
        pending: {}
        _progress_turns: 3
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm._progress_turns"
      operator: equals
      value: 0

# ═══════════════════════════════════════════════════════════════════
# READBACK STALL
# ═══════════════════════════════════════════════════════════════════

- name: readback_stall_clears_pending
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _readback_stall: 2
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "tell me about the menu"
  expectations:
    response:
    - path: "$.result.sm.pending"
      operator: is_not_null

- name: readback_stall_exhaust_escalates
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _readback_stall: 2
        _retries:
          readback: 1
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "what's the weather"
  expectations:
    response:
    - path: "$.result.sm.status"
      operator: equals
      value: "escalated"
    - path: "$.result.action.message"
      operator: contains
      value: "555-0100"

# ═══════════════════════════════════════════════════════════════════
# TOOL HIDING
# ═══════════════════════════════════════════════════════════════════

- name: tool_hiding_collection_hides_readback
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.hide_tools"
      operator: contains
      value: "confirm_pending"
    - path: "$.result.action.hide_tools"
      operator: contains
      value: "reject_pending"

- name: tool_hiding_filled_setter_hidden
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
        pending: {}
        _last_state:
          filled:
            welcome: true
            party_size: 4
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.hide_tools"
      operator: contains
      value: "set_party_size"

- name: tool_hiding_prerequisite_not_met
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
        pending: {}
        task_results: {}
        _last_state:
          filled:
            welcome: true
            party_size: 4
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.hide_tools"
      operator: contains
      value: "set_selected_time"

- name: tool_hiding_executors_always_hidden
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.hide_tools"
      operator: contains
      value: "find_available_times"
    - path: "$.result.action.hide_tools"
      operator: contains
      value: "book_reservation"

- name: tool_hiding_awaiting_confirm_shows_readback
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "hmm let me think"
  expectations:
    response:
    - path: "$.result.action.hide_tools"
      operator: is_not_null

# ═══════════════════════════════════════════════════════════════════
# ERROR RETRY COUNTER — resets after successful fill
# ═══════════════════════════════════════════════════════════════════

- name: error_retry_counter_resets_on_fill
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
        pending: {}
        _retries:
          "slot:party_size": 2
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm._retries['slot:party_size']"
      operator: is_null

# ═══════════════════════════════════════════════════════════════════
# READBACK STALL — non-exhaust clears pending and asks next
# ═══════════════════════════════════════════════════════════════════

- name: readback_stall_nonexhaust_asks_next
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _readback_stall: 2
        _retries: {}
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "I'm not sure"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.force_preempt"
      operator: equals
      value: true
    - path: "$.result.sm.pending"
      operator: equals
      value: {}
