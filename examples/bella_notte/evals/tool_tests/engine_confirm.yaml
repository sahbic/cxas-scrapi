# Slot filling engine: affirmative detection, auto-confirm, inline-confirm
_config: &config
  slots:
  - name: welcome
    source: announce
    message: "Welcome to Bella Notte!"
    preempt: false
  - name: party_size
    source: ["event", "user"]
    event_key: party_size
    setter: set_party_size
    hint: "Party size"
    ask: "How many guests will be dining?"
    readback_fmt:
      type: plural
      one: guest
      other: guests
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        out_of_range: "Parties of 1 to 8 only."
        parse_error: "How many guests?"
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: large_party_phone
    source: user
    setter: set_large_party_phone
    hint: "Contact phone number (for parties of 5 or more)"
    condition: "lambda filled: int(filled.get('party_size', 0)) >= 5"
    ask: "What's the best contact number?"
    readback_fmt:
      type: prefix
      text: "contact phone"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_phone: "Need at least 7 digits."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: preferred_date
    source: user
    setter: set_preferred_date
    hint: "Date"
    ask: "What date would you like to come in?"
    readback_fmt: date
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_format: "Please use YYYY-MM-DD."
        past_date: "That date is in the past."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: available_times
    source: "task:FindAvailableTimes"
  - name: selected_time
    source: user
    setter: set_selected_time
    hint: "Time"
    requires: ["available_times"]
    validate_against:
      response_field: display_value
      filled_slot: available_times
      error_code: not_available
    ask: "We have {available_times}. Which time?"
    readback_fmt: time
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        not_available: "That time isn't available."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: guest_name
    source: user
    setter: set_guest_name
    hint: "Name"
    ask: "What name for the reservation?"
    readback_fmt:
      type: prefix
      text: "under the name"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        empty_name: "I didn't catch the name."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: special_requests
    source: user
    setter: set_special_requests
    hint: 'Special requests or "none"'
    ask: "Any special requests?"
    readback_fmt:
      type: none_sub
      default: "no special requests"
    requires_readback: true
  - name: confirmation_number
    source: "task:BookReservation"
  tasks:
  - name: FindAvailableTimes
    tool: find_available_times
    inputs: ["party_size", "preferred_date"]
    outputs:
      available_times: available_times
    success_check: success
    then_say: "We have {available_times}."
    on_failure:
      retry_say: "No availability. Try another date?"
      max_retries: 1
      clear_slots: ["preferred_date"]
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: BookReservation
    tool: book_reservation
    inputs: ["party_size", "large_party_phone", "preferred_date", "selected_time", "guest_name", "special_requests"]
    readback_inputs: true
    outputs:
      confirmation_number: confirmation_number
    success_check: success
    terminal: true
    then_say: "Confirmed! Number: {confirmation_number}."
    on_failure:
      retry_say: "Let me try again."
      max_retries: 2
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  confirm_transition_prefix: "Perfect!"
  readback_retry:
    max_retries: 2
    on_exhaust:
      say: "Please call us at 555-0100."
      then: escalate
  progress_stall:
    max_turns: 4
    on_exhaust:
      say: "Please call us at 555-0100."
      then: escalate

tests:
# ═══════════════════════════════════════════════════════════════════
# AUTO-CONFIRM — pure affirmative during readback
# ═══════════════════════════════════════════════════════════════════

- name: auto_confirm_yes
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "yes"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.function_call.name"
      operator: equals
      value: "confirm_pending"

- name: auto_confirm_looks_good
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "Looks good!"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.function_call.name"
      operator: equals
      value: "confirm_pending"

- name: auto_confirm_yes_thats_right
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "Yes that's right"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.function_call.name"
      operator: equals
      value: "confirm_pending"

- name: auto_confirm_correct_with_punctuation
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "Correct!"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.function_call.name"
      operator: equals
      value: "confirm_pending"

- name: auto_confirm_sure_sounds_good
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "Sure sounds good"
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.function_call.name"
      operator: equals
      value: "confirm_pending"

# ═══════════════════════════════════════════════════════════════════
# NO AUTO-CONFIRM — correction signals block it
# ═══════════════════════════════════════════════════════════════════

- name: no_auto_confirm_yes_but
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "Yes but actually make it 6"
  expectations:
    response:
    - path: "$.result.action.function_call"
      operator: is_null

- name: no_auto_confirm_yep_wait
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "Yep wait no"
  expectations:
    response:
    - path: "$.result.action.function_call"
      operator: is_null

- name: no_auto_confirm_empty_message
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.function_call"
      operator: is_null

# ═══════════════════════════════════════════════════════════════════
# INLINE-CONFIRM — affirmative + new content
# ═══════════════════════════════════════════════════════════════════

- name: inline_confirm_yes_plus_content
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "Yea, also my wife has a shellfish allergy"
  expectations:
    response:
    - path: "$.result.action.inline_confirmed"
      operator: equals
      value: true
    - path: "$.result.sm.filled.party_size"
      operator: equals
      value: 4

- name: no_inline_confirm_pure_rejection
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending:
          party_size: 4
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
      last_user_text: "no that's wrong"
  expectations:
    response:
    - path: "$.result.action.inline_confirmed"
      operator: equals
      value: false
    - path: "$.result.action.function_call"
      operator: is_null

# ═══════════════════════════════════════════════════════════════════
# INLINE CONFIRM — defers task fire
# ═══════════════════════════════════════════════════════════════════

- name: inline_confirm_defers_task_fire
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
        pending:
          preferred_date: "2027-06-01"
        _last_state:
          filled:
            welcome: true
            party_size: 4
          pending:
            preferred_date: "2027-06-01"
          deferred: {}
      last_user_text: "Yea, also I was wondering if an evening time is available"
  expectations:
    response:
    - path: "$.result.action.inline_confirmed"
      operator: equals
      value: true
    - path: "$.result.action.function_call"
      operator: is_null
    - path: "$.result.sm.filled.preferred_date"
      operator: equals
      value: "2027-06-01"

# ═══════════════════════════════════════════════════════════════════
# AUTO CONFIRM — next turn doesn't re-readback confirmed values
# ═══════════════════════════════════════════════════════════════════

- name: auto_confirm_no_rereadback
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
        pending: {}
        _last_state:
          filled:
            welcome: true
          pending:
            party_size: 4
          deferred: {}
        _readback_transition: true
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.si_suffix"
      operator: is_not_null
    - path: "$.result.action.message"
      operator: contains
      value: "What date"
