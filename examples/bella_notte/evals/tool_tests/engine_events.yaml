# Slot filling engine: event pre-fill
_config: &config
  slots:
  - name: welcome
    source: announce
    message: "Welcome to Bella Notte!"
    preempt: false
  - name: party_size
    source: ["event", "user"]
    event_key: party_size
    setter: set_party_size
    hint: "Party size"
    ask: "How many guests will be dining?"
    readback_fmt:
      type: plural
      one: guest
      other: guests
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        out_of_range: "Parties of 1 to 8 only."
        parse_error: "How many guests?"
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: large_party_phone
    source: user
    setter: set_large_party_phone
    hint: "Contact phone number (for parties of 5 or more)"
    condition: "lambda filled: int(filled.get('party_size', 0)) >= 5"
    ask: "What's the best contact number?"
    readback_fmt:
      type: prefix
      text: "contact phone"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_phone: "Need at least 7 digits."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: preferred_date
    source: user
    setter: set_preferred_date
    hint: "Date"
    ask: "What date would you like to come in?"
    readback_fmt: date
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_format: "Please use YYYY-MM-DD."
        past_date: "That date is in the past."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: available_times
    source: "task:FindAvailableTimes"
  - name: selected_time
    source: user
    setter: set_selected_time
    hint: "Time"
    requires: ["available_times"]
    validate_against:
      response_field: display_value
      filled_slot: available_times
      error_code: not_available
    ask: "We have {available_times}. Which time?"
    readback_fmt: time
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        not_available: "That time isn't available."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: guest_name
    source: user
    setter: set_guest_name
    hint: "Name"
    ask: "What name for the reservation?"
    readback_fmt:
      type: prefix
      text: "under the name"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        empty_name: "I didn't catch the name."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: special_requests
    source: user
    setter: set_special_requests
    hint: 'Special requests or "none"'
    ask: "Any special requests?"
    readback_fmt:
      type: none_sub
      default: "no special requests"
    requires_readback: true
  - name: confirmation_number
    source: "task:BookReservation"
  tasks:
  - name: FindAvailableTimes
    tool: find_available_times
    inputs: ["party_size", "preferred_date"]
    outputs:
      available_times: available_times
    success_check: success
    then_say: "We have {available_times}."
    on_failure:
      retry_say: "No availability. Try another date?"
      max_retries: 1
      clear_slots: ["preferred_date"]
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: BookReservation
    tool: book_reservation
    inputs: ["party_size", "large_party_phone", "preferred_date", "selected_time", "guest_name", "special_requests"]
    readback_inputs: true
    outputs:
      confirmation_number: confirmation_number
    success_check: success
    terminal: true
    then_say: "Confirmed! Number: {confirmation_number}."
    on_failure:
      retry_say: "Let me try again."
      max_retries: 2
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  confirm_transition_prefix: "Perfect!"
  readback_retry:
    max_retries: 2
    on_exhaust:
      say: "Please call us at 555-0100."
      then: escalate
  progress_stall:
    max_turns: 4
    on_exhaust:
      say: "Please call us at 555-0100."
      then: escalate

tests:
# ═══════════════════════════════════════════════════════════════════
# EVENT PRE-FILL
# ═══════════════════════════════════════════════════════════════════

- name: event_prefill_party_size
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        filled: {}
        pending: {}
      last_user_text: ""
      event_data:
        party_size: 4
  expectations:
    response:
    - path: "$.result.sm.filled.party_size"
      operator: equals
      value: 4
    - path: "$.result.action.event_prefilled"
      operator: equals
      value: true

- name: event_prefill_idempotent_already_filled
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        filled:
          party_size: 4
        pending: {}
        _last_state:
          filled:
            party_size: 4
          pending: {}
          deferred: {}
      last_user_text: ""
      event_data:
        party_size: 4
  expectations:
    response:
    - path: "$.result.sm.filled.party_size"
      operator: equals
      value: 4
    - path: "$.result.action.event_prefilled"
      operator: equals
      value: false

- name: event_prefill_no_event_data
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        filled: {}
        pending: {}
      last_user_text: ""
      event_data: {}
  expectations:
    response:
    - path: "$.result.action.event_prefilled"
      operator: equals
      value: false
    - path: "$.result.action.message"
      operator: contains
      value: "Welcome"

# ═══════════════════════════════════════════════════════════════════
# EVENT PREFILL — multiple slots at once
# ═══════════════════════════════════════════════════════════════════

- name: event_prefill_multiple_slots
  tool: slot_filling_engine
  args:
    input_data:
      raw_config:
        slots:
        - name: name
          source: ["event", "user"]
          event_key: name
          setter: set_name
          hint: "Name"
          ask: "What name?"
          requires_readback: true
        - name: email
          source: ["event", "user"]
          event_key: email
          setter: set_email
          hint: "Email"
          ask: "What email?"
          requires_readback: true
        - name: phone
          source: user
          setter: set_phone
          hint: "Phone"
          ask: "What phone?"
          requires_readback: true
        tasks: []
        confirm_transition_prefix: ""
        readback_retry:
          max_retries: 2
          on_exhaust:
            say: "Error."
            then: escalate
        progress_stall:
          max_turns: 4
          on_exhaust:
            say: "Error."
            then: escalate
      sm:
        filled: {}
        pending: {}
      last_user_text: ""
      event_data:
        name: "Alice"
        email: "alice@example.com"
  expectations:
    response:
    - path: "$.result.sm.filled.name"
      operator: equals
      value: "Alice"
    - path: "$.result.sm.filled.email"
      operator: equals
      value: "alice@example.com"
    - path: "$.result.sm.filled.phone"
      operator: is_null
    - path: "$.result.action.event_prefilled"
      operator: equals
      value: true

- name: event_prefill_skips_inactive_conditional
  tool: slot_filling_engine
  args:
    input_data:
      raw_config:
        slots:
        - name: party_size
          source: ["event", "user"]
          event_key: party_size
          setter: set_party_size
          hint: "Party size"
          ask: "How many?"
          requires_readback: true
        - name: large_party_phone
          source: ["event", "user"]
          event_key: phone
          setter: set_phone
          hint: "Phone (large parties)"
          condition: "lambda filled: int(filled.get('party_size', 0)) >= 5"
          ask: "Phone number?"
          requires_readback: true
        tasks: []
        confirm_transition_prefix: ""
        readback_retry:
          max_retries: 2
          on_exhaust:
            say: "Error."
            then: escalate
        progress_stall:
          max_turns: 4
          on_exhaust:
            say: "Error."
            then: escalate
      sm:
        filled: {}
        pending: {}
      last_user_text: ""
      event_data:
        party_size: 2
        phone: "555-1234"
  expectations:
    response:
    - path: "$.result.sm.filled.party_size"
      operator: equals
      value: 2
    - path: "$.result.sm.filled.large_party_phone"
      operator: is_null

# ═══════════════════════════════════════════════════════════════════
# EVENT MAPPINGS — CES event name maps to slot values via config
# ═══════════════════════════════════════════════════════════════════

- name: event_mapping_maps_event_to_slot
  tool: slot_filling_engine
  args:
    input_data:
      raw_config:
        slots:
        - name: alert_price_type
          source: ["event", "user"]
          setter: set_alert_price_type
          hint: "Price type"
          ask: "Bid, ask, or last?"
          requires_readback: true
        tasks: []
        confirm_transition_prefix: ""
        readback_retry:
          max_retries: 2
          on_exhaust:
            say: "Error."
            then: escalate
        progress_stall:
          max_turns: 4
          on_exhaust:
            say: "Error."
            then: escalate
        event_mappings:
          alert_last_price:
            alert_price_type: "last"
          alert_bid_price:
            alert_price_type: "bid"
      sm:
        filled: {}
        pending: {}
      last_user_text: ""
      event_data:
        ia_event_name: "alert_last_price"
  expectations:
    response:
    - path: "$.result.sm.filled.alert_price_type"
      operator: equals
      value: "last"

- name: event_mapping_no_match_ignored
  tool: slot_filling_engine
  args:
    input_data:
      raw_config:
        slots:
        - name: alert_price_type
          source: ["event", "user"]
          setter: set_alert_price_type
          hint: "Price type"
          ask: "Bid, ask, or last?"
          requires_readback: true
        tasks: []
        confirm_transition_prefix: ""
        readback_retry:
          max_retries: 2
          on_exhaust:
            say: "Error."
            then: escalate
        progress_stall:
          max_turns: 4
          on_exhaust:
            say: "Error."
            then: escalate
        event_mappings:
          alert_last_price:
            alert_price_type: "last"
      sm:
        filled: {}
        pending: {}
      last_user_text: ""
      event_data:
        ia_event_name: "some_other_event"
  expectations:
    response:
    - path: "$.result.sm.filled.alert_price_type"
      operator: is_null
    - path: "$.result.action.message"
      operator: contains
      value: "Bid, ask, or last?"
