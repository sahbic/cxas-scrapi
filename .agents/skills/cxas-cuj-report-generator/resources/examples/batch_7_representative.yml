subintent_id: order-cancel
subintent_name: Cancel Active Order
parent_cuj: Digital Ordering
turns:
- speaker: Agent
  text: Hello! Thanks for calling Dining Service. How can I help you today?
- speaker: User
  text: 'Hi, I just placed an order #9982, but I need to cancel it right away if possible.'
- speaker: Agent
  text: Oh, let me check if the kitchen has started preparing it yet. If not, we can definitely cancel it.
- speaker: Agent
  text: Checking if order preparation has started.
  tool_call:
    name: get_order_status
    payload:
      order_id: '9982'
    response:
      status: success
      order_state: received
      cancelable: true
- speaker: Agent
  text: Good news, they haven't started prepping it yet! Would you like me to go ahead and cancel the order and issue a full refund?
- speaker: User
  text: Yes, please cancel it. Thank you.
- speaker: Agent
  text: Cancelling order in system and processing refund.
  tool_call:
    name: cancel_order
    payload:
      order_id: '9982'
    response:
      status: success
      cancelled: true
      refund_ref: REF-ORD-22
- speaker: Agent
  text: 'Alright, order #9982 has been successfully cancelled, and a full refund has been issued back to your card. You''ll get an email confirmation shortly.'
- speaker: Agent
  text: Is there anything else I can help you with today?
- speaker: User
  text: No, that's all. Thank you.
- speaker: Agent
  text: Thank you for calling Dining Service! Goodbye.
  tool_call:
    name: end_session
    payload:
      session_escalated: false
      reason: Conversation completed successfully
    response:
      result: success
