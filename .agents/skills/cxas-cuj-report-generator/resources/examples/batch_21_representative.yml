subintent_id: loyalty-join-program
subintent_name: Join Loyalty Program
parent_cuj: Loyalty & Rewards
turns:
- speaker: Agent
  text: Hello! Thanks for calling Dining Service. How can I help you today?
- speaker: User
  text: Hi, I'd like to sign up for your loyalty program to start earning rewards on my orders.
- speaker: Agent
  text: We'd love to have you! To sign up, can you please provide your first name, email, and phone number?
- speaker: User
  text: Sure. First name is David, email is david@example.com, and phone is 555-987-6543.
- speaker: Agent
  text: Creating customer rewards profile in database.
  tool_call:
    name: create_loyalty_profile
    payload:
      first_name: David
      email: david@example.com
      phone_number: 555-987-6543
    response:
      status: success
      account_number: LOY-7788
      points_balance: 50
- speaker: Agent
  text: Is there anything else I can help you with today?
- speaker: User
  text: No, that's all. Thank you.
- speaker: Agent
  text: Thank you for calling Dining Service! Goodbye.
  tool_call:
    name: end_session
    payload:
      session_escalated: false
      reason: Conversation completed successfully
    response:
      result: success
