subintent_id: order-apply-promo
subintent_name: Apply Promo Code
parent_cuj: Digital Ordering
turns:
- speaker: Agent
  text: Hello! Thanks for calling Dining Service. How can I help you today?
- speaker: User
  text: Hi, I'm trying to place an online order but my promo code 'PIZZA20' isn't working. Can you apply it?
- speaker: Agent
  text: Sure thing, I can help apply that! What is the subtotal of your order currently?
- speaker: User
  text: My subtotal is thirty dollars and ninety-eight cents.
- speaker: Agent
  text: Validating promo code and applying discount.
  tool_call:
    name: apply_discount_code
    payload:
      promo_code: PIZZA20
      subtotal: 30.98
    response:
      status: success
      discount_applied: 6.2
      new_subtotal: 24.78
- speaker: Agent
  text: Okay, that code worked! It saved you six dollars and twenty cents, bringing your new total to twenty-four seventy-eight. Shall I go ahead and place the order for you now?
- speaker: User
  text: Yes, please place it. Use my default card.
- speaker: Agent
  text: Submitting final discounted order.
  tool_call:
    name: place_order
    payload:
      total_amount: 24.78
    response:
      status: success
      order_id: '9983'
- speaker: Agent
  text: Is there anything else I can help you with today?
- speaker: User
  text: No, that's all. Thank you.
- speaker: Agent
  text: Thank you for calling Dining Service! Goodbye.
  tool_call:
    name: end_session
    payload:
      session_escalated: false
      reason: Conversation completed successfully
    response:
      result: success
